{% extends "base.html" %}
{% block tittle %}Iniciar sesión - {% endblock %}
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='styles/forms.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}">
{% endblock css %}

{% block content %}
<div class="vh-container bg-color">
    <section class="form font-roboto">
        <div class="display-center mb-2">
            {% if company == 'RAM' %}
                <img src="{{ url_for('static', filename='images/logo.webp') }}" class="logo-img" alt="">
            {% elif company == 'WMM' %}
                <img src="{{ url_for('static', filename='images/williams_logo.webp') }}" class="logo-img" alt="">
            {% endif %}
        </div>
        <form action="" method="post" onsubmit="loader('Iniciando')" class="form-container font-roboto" autocomplete="off">
            <div class="mb-15">
                <div class="form-element-container">
                    <div class="form-label-container">
                        <label for="user">
                            No. de Empleado:
                        </label>
                    </div>
                    <div class="form-input-w-icon-container">
                        <div class="form-input-icon-container">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T560-640q0-33-23.5-56.5T480-720q-33 0-56.5 23.5T400-640q0 33 23.5 56.5T480-560Zm0-80Zm0 400Z"/></svg>
                        </div>
                        <input type="number" name="user" class="form-input-w-icon font-poppins w-100 no-show-number" min="1" placeholder="Ingresar usuario" id="user" autofocus required>
                    </div>
                </div>
                <div class="form-element-container">
                    <div class="form-label-container">
                        <label for="password">
                            Contraseña:
                        </label>
                    </div>
                    <div class="form-input-w-icon-container">
                        <div class="form-input-icon-container">
                            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="24px"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/></svg>
                        </div>
                        <input type="password" name="password" class="form-input-w-icon font-poppins w-100" placeholder="Ingresar contraseña" id="password" required>
                    </div>
                </div>
            </div>
            <div class="form-single-button-container w-100">
                <button type="submit" class="form-button w-100">
                    Iniciar sesión
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M480-120v-80h280v-560H480v-80h280q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H480Zm-80-160-55-58 102-102H120v-80h327L345-622l55-58 200 200-200 200Z"/></svg>
                </button>
            </div>
        </form>
    </section>
</div>

<script> if (localStorage.getItem("timeoutStart")) localStorage.removeItem("timeoutStart"); </script>
{% endblock %}
