{% extends "base.html" %}
{% block tittle %}{{ title }} - {% endblock %}
{% block css %}
<link rel="stylesheet" href="../static/styles/user_control.css">
<link rel="stylesheet" href="{{ url_for('static', filename='styles/forms.css') }}">
{% endblock css %}

{% block content %}
<div class="container min-dvh-100 center-container">
    <div class="user-control p-2 font-poppins">
        <div class="logo-container">
            <img src="../static/Images/logo.webp" class="logo mb-2 w-75" alt="">
        </div>
        <div class="user-control-form-container">
            <form action="" method="post" class="form-container font-roboto">
                <div class="mb-15">
                    <div class="form-element-container">
                        <div class="form-label-container">
                            <label for="id">Num. de empleado:</label>
                        </div>
                        <div class="form-input-w-icon-container">
                            <div class="form-input-icon-container">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T560-640q0-33-23.5-56.5T480-720q-33 0-56.5 23.5T400-640q0 33 23.5 56.5T480-560Zm0-80Zm0 400Z"/></svg>
                            </div>
                            <input type="number" class="form-input-w-icon font-poppins w-100" name="id" id="id" required value="{{ user.id }}" readonly>
                        </div>
                    </div>
                    <div class="form-element-container">
                        <div class="form-label-container">
                            <label for="full_name">Nombre completo:</label>
                        </div>
                        <div class="form-input-w-icon-container">
                            <div class="form-input-icon-container">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M160-80q-33 0-56.5-23.5T80-160v-440q0-33 23.5-56.5T160-680h200v-120q0-33 23.5-56.5T440-880h80q33 0 56.5 23.5T600-800v120h200q33 0 56.5 23.5T880-600v440q0 33-23.5 56.5T800-80H160Zm0-80h640v-440H600q0 33-23.5 56.5T520-520h-80q-33 0-56.5-23.5T360-600H160v440Zm80-80h240v-18q0-17-9.5-31.5T444-312q-20-9-40.5-13.5T360-330q-23 0-43.5 4.5T276-312q-17 8-26.5 22.5T240-258v18Zm320-60h160v-60H560v60Zm-200-60q25 0 42.5-17.5T420-420q0-25-17.5-42.5T360-480q-25 0-42.5 17.5T300-420q0 25 17.5 42.5T360-360Zm200-60h160v-60H560v60ZM440-600h80v-200h-80v200Zm40 220Z"/></svg>
                            </div>
                            <input type="text" class="form-input-w-icon font-poppins w-100" name="full_name" id="full_name" required value="{{ user.full_name }}" autofocus>
                        </div>
                    </div>
                    <div class="form-element-container">
                        <div class="form-label-container">
                            <label for="email">Correo electrónico:</label>
                        </div>
                        <div class="form-input-w-icon-container">
                            <div class="form-input-icon-container">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480v58q0 59-40.5 100.5T740-280q-35 0-66-15t-52-43q-29 29-65.5 43.5T480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480v58q0 26 17 44t43 18q26 0 43-18t17-44v-58q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93h200v80H480Zm0-280q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Z"/></svg>
                            </div>
                            <input type="email" class="form-input-w-icon font-poppins w-100" name="email" id="email" required value="{{ user.email }}">
                        </div>
                    </div>
                    <div class="form-element-container">
                        <div class="form-label-container">
                            <label for="emp_type">Tipo de empleado:</label>
                        </div>
                        <div class="form-input-w-icon-container">
                            <div class="form-input-icon-container">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M440-120v-240h80v80h320v80H520v80h-80Zm-320-80v-80h240v80H120Zm160-160v-80H120v-80h160v-80h80v240h-80Zm160-80v-80h400v80H440Zm160-160v-240h80v80h160v80H680v80h-80Zm-480-80v-80h400v80H120Z"/></svg>
                            </div>
                            <select name="emp_type" id="emp_type" class="form-input-w-icon font-poppins w-100" required>
                            {% for emp_type in empType_list  %}
                                <option value="{{ emp_type.id_empType }}" {% if user.id_empType == emp_type.id_empType %}selected{% endif %}>{{ emp_type.empType_name }}</option>
                            {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="form-element-container">
                        <div class="form-label-container">
                            <label for="doc_num">Empresa:</label>
                        </div>
                        <div class="form-input-container">
                            <div class="w-100 form-radio-options d-flex-center">
                                <label for="company_ram">
                                    <div class="form-radio-btn">
                                        <input type="radio" name="company" id="company_ram" value="RAM" {% if user.company == 'RAM' %} checked {% endif %}>
                                        <img src="{{ url_for('static', filename='images/logo_Letters.webp') }}" alt="">
                                        RAM
                                    </div>
                                </label>
                                <label for="company_will">
                                    <div class="form-radio-btn">
                                        <img src="{{ url_for('static', filename='images/williams_logo.webp') }}" alt="">
                                        <input type="radio" name="company" id="company_will" value="WMM" {% if user.company == 'WMM' %} checked {% endif %}>
                                        Williams
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                    {% if current_user.user_lvl.level_name == "Admin" %}
                        <div class="form-element-container">
                            <div class="form-label-container">
                                <label for="user_level">Nivel:</label>
                            </div>
                            <div class="form-input-w-icon-container">
                                <div class="form-input-icon-container">
                                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M400-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM80-160v-112q0-33 17-62t47-44q51-26 115-44t141-18h14q6 0 12 2-8 18-13.5 37.5T404-360h-4q-71 0-127.5 18T180-306q-9 5-14.5 14t-5.5 20v32h252q6 21 16 41.5t22 38.5H80Zm560 40-12-60q-12-5-22.5-10.5T584-204l-58 18-40-68 46-40q-2-14-2-26t2-26l-46-40 40-68 58 18q11-8 21.5-13.5T628-460l12-60h80l12 60q12 5 22.5 11t21.5 15l58-20 40 70-46 40q2 12 2 25t-2 25l46 40-40 68-58-18q-11 8-21.5 13.5T732-180l-12 60h-80Zm40-120q33 0 56.5-23.5T760-320q0-33-23.5-56.5T680-400q-33 0-56.5 23.5T600-320q0 33 23.5 56.5T680-240ZM400-560q33 0 56.5-23.5T480-640q0-33-23.5-56.5T400-720q-33 0-56.5 23.5T320-640q0 33 23.5 56.5T400-560Zm0-80Zm12 400Z"/></svg>
                                </div>
                                <select name="user_level" id="user_level" class="form-input-w-icon font-poppins w-100" required >
                                    {% for user_lvl in user_lvl_list  %}
                                        <option value="{{ user_lvl.id_user_level }}" {% if user.user_level == user_lvl.id_user_level %}selected{% endif %}>{{ user_lvl.level_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    {%endif%}
                </div>
                <div class="form-single-button-container w-100">
                    <button type="submit" class="form-button w-100">
                        {{ title }}
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M80-160v-112q0-33 17-62t47-44q51-26 115-44t141-18q30 0 58.5 3t55.5 9l-70 70q-11-2-21.5-2H400q-71 0-127.5 17T180-306q-9 5-14.5 14t-5.5 20v32h250l80 80H80Zm542 16L484-282l56-56 82 82 202-202 56 56-258 258ZM400-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Zm10 240Zm-10-320q33 0 56.5-23.5T480-640q0-33-23.5-56.5T400-720q-33 0-56.5 23.5T320-640q0 33 23.5 56.5T400-560Zm0-80Z"/></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
